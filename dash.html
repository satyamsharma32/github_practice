<!DOCTYPE html>
<html>
<head>
    <title>Simple Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
        }

        .header {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        .card {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin: 0;
            color: #333;
        }

        p {
            font-size: 24px;
            color: #007bff;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Dashboard</h1>
    </div>

    <div class="container">
        <div class="card">
            <h2>Users</h2>
            <p>150</p>
        </div>

        <div class="card">
            <h2>Orders</h2>
            <p>75</p>
        </div>

        <div class="card">
            <h2>Revenue</h2>
            <p>$5000</p>
        </div>
    </div>

</body>
</html>
